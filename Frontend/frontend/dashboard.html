<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGov - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .sidebar { background-color: #004080; }
        .card:hover { transform: translateY(-3px); transition: 0.3s; }
        .active-nav { background-color: rgba(255, 255, 255, 0.1); border-left: 4px solid #fff; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="sidebar w-64 text-white flex flex-col shadow-xl">
        <div class="p-6 border-b border-blue-800 flex items-center space-x-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                <path d="M2 17l10 5 10-5M2 12l10 5 10-5"></path>
            </svg>
            <span class="text-xl font-bold tracking-wider">SmartGov</span>
        </div>
        <nav class="flex-1 p-4 space-y-2 text-sm" id="dynamic-nav"></nav>
        <div class="p-4 border-t border-blue-800">
            <a href="index.html" class="flex items-center space-x-2 text-red-300 hover:text-red-100 transition">
                <span>Log Out</span>
            </a>
        </div>
    </aside>

    <main class="flex-1 p-8">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-bold text-gray-800" id="welcome-text">Welcome Back!</h1>
                <p class="text-gray-500" id="current-date"></p>
            </div>
            <div id="role-badge" class="px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest border shadow-sm"></div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10" id="stat-cards"></div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
            <h2 class="text-xl font-semibold mb-4 text-gray-700" id="activity-title">Recent Activity</h2>
            <div id="activity-content" class="border-t border-gray-100 pt-4">
                No recent records found.
            </div>
        </div>
    </main>

    <div id="issueModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 flex">
        <div class="bg-white rounded-xl p-8 w-full max-w-lg shadow-2xl">
            <h2 class="text-2xl font-bold mb-4 text-gray-800">Report an Issue</h2>
            <form id="issueForm" class="space-y-4">
                <input type="text" placeholder="Location" class="w-full border p-2 rounded-lg" required>
                <textarea placeholder="Description" class="w-full border p-2 rounded-lg" required></textarea>
                <div class="flex justify-end space-x-3 mt-6">
                    <button type="button" onclick="toggleModal('issueModal')" class="text-gray-500">Cancel</button>
                    <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg">Submit Report</button>
                </div>
            </form>
        </div>
    </div>

    <div id="paymentModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 flex">
        <div class="bg-white rounded-xl p-8 w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-bold mb-2 text-gray-800">Secure Payment</h2>
            <p class="text-gray-500 mb-6 text-sm">Clear your outstanding Water Utility Bill.</p>
            <form id="paymentForm" class="space-y-4">
                <div class="bg-gray-50 p-4 rounded-lg mb-4 flex justify-between">
                    <span class="font-semibold text-gray-600">Amount Due:</span>
                    <span class="text-blue-700 font-bold">₹ 120.00</span>
                </div>
                <input type="text" placeholder="Card Holder Name" class="w-full border p-2 rounded-lg" required>
                <input type="text" placeholder="Card Number" class="w-full border p-2 rounded-lg" maxlength="16" required>
                <div class="flex gap-2">
                    <input type="text" placeholder="MM/YY" class="w-1/2 border p-2 rounded-lg" maxlength="5" required>
                    <input type="password" placeholder="CVV" class="w-1/2 border p-2 rounded-lg" maxlength="3" required>
                </div>
                <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 mt-4 transition">Confirm Payment</button>
                <button type="button" onclick="toggleModal('paymentModal')" class="w-full text-gray-400 text-sm mt-2">Cancel Transaction</button>
            </form>
        </div>
    </div>

    <script>
        // Modal Toggler by ID
        function toggleModal(id) {
            document.getElementById(id).classList.toggle('hidden');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const userType = params.get('type') || 'citizen';
            
            const nav = document.getElementById('dynamic-nav');
            const welcome = document.getElementById('welcome-text');
            const badge = document.getElementById('role-badge');
            const stats = document.getElementById('stat-cards');
            const activityTitle = document.getElementById('activity-title');
            const activityContent = document.getElementById('activity-content');
            
            document.getElementById('current-date').textContent = new Date().toDateString();

            if (userType === 'admin') {
                welcome.textContent = "City Administrator Control";
                badge.textContent = "Admin";
                badge.className += " bg-red-100 text-red-800 border-red-200";
                nav.innerHTML = `<a href="#" class="block p-3 active-nav rounded-lg">System Health</a><a href="#" class="block p-3 hover:bg-blue-700 rounded-lg">User Management</a>`;
                stats.innerHTML = `<div class="card bg-white p-6 rounded-xl border-l-4 border-red-600"><h3>Revenue</h3><p class="text-2xl font-bold">₹ 4.2 Cr</p></div>`;

            } else if (userType === 'officer') {
                welcome.textContent = "Municipal Officer Portal";
                badge.textContent = "Officer";
                badge.className += " bg-orange-100 text-orange-800 border-orange-200";
                nav.innerHTML = `<a href="#" class="block p-3 active-nav rounded-lg">My Tasks</a>`;
                stats.innerHTML = `<div class="card bg-white p-6 rounded-xl border-l-4 border-orange-500"><h3>Pending Approval</h3><p class="text-2xl font-bold">14</p></div>`;

            } else {
                // CITIZEN SPECIFIC LOGIC
                welcome.textContent = "Welcome, Citizen";
                badge.textContent = "Citizen";
                badge.className += " bg-blue-100 text-blue-800 border-blue-200";
                
                nav.innerHTML = `
                    <a href="#" class="block p-3 active-nav rounded-lg">Dashboard</a>
                    <button onclick="toggleModal('issueModal')" class="w-full text-left p-3 hover:bg-blue-700 rounded-lg transition">Report an Issue</button>
                    <a href="#" class="block p-3 hover:bg-blue-700 rounded-lg">My Certificates</a>
                    <a href="#" class="block p-3 hover:bg-blue-700 rounded-lg">Payment History</a>`;
                
                stats.innerHTML = `
                    <div class="card bg-white p-6 rounded-xl border-l-4 border-blue-500"><h3>Active Apps</h3><p class="text-2xl font-bold">3</p></div>
                    <div class="card bg-white p-6 rounded-xl border-l-4 border-indigo-500"><h3>Wallet</h3><p class="text-2xl font-bold">₹ 500.00</p></div>
                    <div class="card bg-white p-6 rounded-xl border-l-4 border-red-500"><h3>Pending Bills</h3><p id="bill-count" class="text-2xl font-bold">2</p></div>`;

                activityContent.innerHTML = `
                    <div class="flex justify-between items-center p-4 bg-red-50 border border-red-100 rounded-lg" id="bill-row">
                        <div>
                            <p class="font-bold text-red-800">Water Utility Bill - Feb 2026</p>
                            <p class="text-xs text-red-600 font-medium">Overdue: ₹ 120.00</p>
                        </div>
                        <button onclick="toggleModal('paymentModal')" class="bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-red-700 transition">Pay Now</button>
                    </div>`;
            }

            // Handle Payment Submission
            document.getElementById('paymentForm')?.addEventListener('submit', (e) => {
                e.preventDefault();
                alert("Payment Confirmed! Your account has been updated.");
                toggleModal('paymentModal');
                
                // Visual update: Remove the red bill row and update the stat card
                const billRow = document.getElementById('bill-row');
                if(billRow) {
                    billRow.remove();
                    document.getElementById('bill-count').textContent = "1";
                    activityContent.innerHTML = "<div class='text-center text-green-600 p-4 font-semibold'>✅ All bills paid for this month!</div>";
                }
            });

            // Handle Issue Submission
            document.getElementById('issueForm')?.addEventListener('submit', (e) => {
                e.preventDefault();
                alert("Report submitted successfully!");
                toggleModal('issueModal');
            });
        });
    </script>
</body>
</html>
